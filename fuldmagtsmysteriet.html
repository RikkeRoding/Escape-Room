<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Room: Fuldmagtsmysteriet</title>
  <style>
    :root {
      --bg: #18202b;
      --panel: #2a2230;
      --panel-alt: #33291f;
      --ink: #fff8e9;
      --muted: #d6c8ad;
      --gold: #d79d36;
      --gold-dark: #8f5d18;
      --blue: #4b8fc9;
      --green: #3e9b64;
      --red: #bf4646;
      --line: rgba(255, 248, 233, 0.18);
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(215, 157, 54, 0.16), transparent 32rem),
        linear-gradient(135deg, #121923 0%, var(--bg) 45%, #261d2a 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    select,
    input[type="checkbox"],
    input[type="radio"] {
      cursor: pointer;
    }

    .app-shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    header {
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(20, 21, 29, 0.82);
      box-shadow: 0 18px 45px var(--shadow);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
      line-height: 1.18;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.35rem);
      color: #ffe1a1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .status-item {
      min-height: 64px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(42, 34, 48, 0.88);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.22);
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .status-value {
      display: block;
      margin-top: 3px;
      font-size: 1.16rem;
      font-weight: 700;
    }

    .progress-wrap {
      height: 14px;
      margin: 0 0 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #111821;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), #69b17e);
      transition: width 260ms ease;
    }

    main.screen {
      min-height: 520px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(33, 32, 41, 0.9);
      box-shadow: 0 22px 60px var(--shadow);
    }

    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .archive-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
      align-items: start;
    }

    .start-seal {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed rgba(255, 225, 161, 0.48);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(51, 41, 31, 0.82), rgba(42, 34, 48, 0.82)),
        repeating-linear-gradient(0deg, transparent, transparent 14px, rgba(255, 255, 255, 0.04) 15px);
      text-align: center;
    }

    .seal-icon {
      font-size: 5rem;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.42));
    }

    .room-title {
      color: #ffe1a1;
      font-size: clamp(1.7rem, 3vw, 2.45rem);
    }

    .story-box,
    .question-box,
    .hint-box,
    .feedback-box,
    .answer-key-box {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 19, 27, 0.45);
    }

    .story-box {
      border-left: 5px solid var(--gold);
    }

    .question-box {
      border-left: 5px solid var(--blue);
    }

    .hint-box {
      border-left: 5px solid #c78fdb;
      color: #f8e9ff;
    }

    .feedback-box {
      min-height: 62px;
      border-left: 5px solid var(--gold);
    }

    .feedback-box.correct {
      border-color: var(--green);
      background: rgba(62, 155, 100, 0.15);
    }

    .feedback-box.wrong {
      border-color: var(--red);
      background: rgba(191, 70, 70, 0.15);
    }

    .feedback-box.info {
      border-color: var(--blue);
      background: rgba(75, 143, 201, 0.14);
    }

    .answer-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .answer-option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      width: 100%;
      min-height: 52px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 248, 233, 0.05);
    }

    .answer-option:hover,
    .answer-option:focus-within {
      border-color: rgba(255, 225, 161, 0.72);
      background: rgba(255, 248, 233, 0.08);
    }

    .answer-option input {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      margin-top: 2px;
    }

    .match-row {
      display: grid;
      grid-template-columns: minmax(110px, 170px) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 248, 233, 0.05);
    }

    .match-name {
      font-weight: 700;
      color: #ffe1a1;
    }

    select {
      width: 100%;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 248, 233, 0.3);
      border-radius: 8px;
      background: #111821;
      color: var(--ink);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 48px;
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      font-weight: 700;
      color: #141414;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .primary-btn {
      background: linear-gradient(180deg, #ffd174, var(--gold));
    }

    .secondary-btn {
      background: linear-gradient(180deg, #b8ddff, var(--blue));
    }

    .primary-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn:disabled,
    .secondary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .danger-btn {
      background: linear-gradient(180deg, #ffb5b5, var(--red));
    }

    .hidden {
      display: none !important;
    }

    .key {
      display: inline-block;
      margin-left: 8px;
      color: #ffe1a1;
    }

    .key-found {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(215, 157, 54, 0.2);
      color: #ffe1a1;
      font-weight: 700;
      animation: keyPop 600ms ease;
    }

    @keyframes keyPop {
      0% { transform: scale(0.85); opacity: 0; }
      70% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .locked::before {
      content: "🔒 ";
    }

    .unlocked::before {
      content: "✅ ";
    }

    .note-list,
    .recap-list,
    .badges {
      margin: 12px 0 0;
      padding-left: 22px;
    }

    .facit-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .answer-key-box h3 {
      color: #ffe1a1;
      font-size: 1.15rem;
    }

    .small-muted {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .room-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 248, 233, 0.07);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 780px) {
      .app-shell {
        width: min(100% - 18px, 1120px);
        padding-top: 10px;
      }

      .status-bar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .archive-grid {
        grid-template-columns: 1fr;
      }

      main.screen,
      header {
        padding: 16px;
      }

      .match-row {
        grid-template-columns: 1fr;
      }

      .button-row button {
        flex: 1 1 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Escape Room: Fuldmagtsmysteriet</h1>
      <p class="subtitle">Løs fuldmagtsgåderne og slip ud af Aftalerettens Arkiv</p>
    </header>

    <section class="status-bar" aria-label="Spilstatus">
      <div class="status-item">
        <span class="status-label">Rum</span>
        <span class="status-value" id="status-room">Start</span>
      </div>
      <div class="status-item">
        <span class="status-label">Score</span>
        <span class="status-value" id="status-score">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">Nøgler</span>
        <span class="status-value" id="status-keys">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">Tid</span>
        <span class="status-value" id="status-time">00:00</span>
      </div>
      <div class="status-item">
        <span class="status-label">Fejl</span>
        <span class="status-value" id="status-mistakes">0</span>
      </div>
    </section>

    <div class="progress-wrap" aria-label="Fremskridt">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <main class="screen" id="game"></main>
  </div>

  <script>
    // State
    let currentRoomIndex = 0;
    let score = 0;
    let keys = 0;
    let mistakes = 0;
    let attemptsInCurrentRoom = 0;
    let hintUsedInCurrentRoom = false;
    let startTime = Date.now();
    let timerId = null;
    let roomSolved = false;
    let solvedWithoutMistakeCount = 0;
    let totalHintsUsed = 0;

    // Data
    const roles = [
      "Fuldmagtsgiver / hovedmand",
      "Fuldmægtig / mellemmand",
      "Tredjemand"
    ];

    const rooms = [
      {
        id: 1,
        title: "Rum 1: Hvem er hvem?",
        topic: "Parterne i et fuldmagtsforhold",
        type: "matching",
        story: "Du vågner i Aftalerettens Arkiv. Døren er låst. På bordet ligger en sagsmappe med tre navne: Alma ejer en cykelbutik. Bo er ansat i butikken og sælger cykler for Alma. Clara køber en cykel af Bo. På døren står: “Kun den, der kan placere parterne korrekt, får den første nøgle.”",
        question: "Match hver person med den juridiske rolle.",
        items: ["Alma", "Bo", "Clara"],
        options: roles,
        correctAnswer: {
          Alma: "Fuldmagtsgiver / hovedmand",
          Bo: "Fuldmægtig / mellemmand",
          Clara: "Tredjemand"
        },
        hint: "Spørg dig selv: Hvem ejer forretningen? Hvem handler på vegne af ejeren? Hvem indgår aftalen udefra?",
        correctFeedback: "Korrekt. Bo handler på Almas vegne, i hendes navn og for hendes regning. Clara er tredjemand. Du får den første nøgle.",
        wrongFeedback: "Prøv igen. Fuldmægtigen er den person, der handler på vegne af en anden.",
        explanation: "Alma er hovedmanden, fordi butikken og dispositionsinteressen er hendes. Bo er fuldmægtigen, fordi han handler på Almas vegne. Clara er tredjemand, fordi hun indgår aftalen udefra.",
        archiveNote: "Husk: Fuldmægtigen handler på vegne af hovedmanden."
      },
      {
        id: 2,
        title: "Rum 2: Den synlige fuldmagt",
        topic: "Fuldmagt med eller uden særlig tilværelse",
        type: "checkbox",
        story: "Du går ind i et rum fyldt med spejle. På væggen står: “Det, omverdenen kan se, kan få juridisk betydning.” Der ligger fire kort på bordet.",
        question: "Vælg de situationer, der er fuldmagt med særlig tilværelse.",
        options: [
          { id: "cashier", text: "En kassemedarbejder sælger varer i en butik." },
          { id: "oral", text: "En person får mundtligt besked på at købe et maleri for max 50.000 kr." },
          { id: "written", text: "En skriftlig fuldmagt vises til en sælger." },
          { id: "tolerance", text: "En medarbejder har gennem længere tid fået lov at indgå ensartede aftaler, uden at chefen protesterer." }
        ],
        correctAnswer: ["cashier", "written", "tolerance"],
        hint: "Med særlig tilværelse betyder, at tredjemand kan se eller opdage fuldmagten på et objektivt grundlag.",
        correctFeedback: "Korrekt. §18-fuldmagten er skjult for omverdenen, mens de andre har en ydre synlighed.",
        wrongFeedback: "Se efter, om tredjemand kan konstatere fuldmagten udefra. Hvis tredjemand kun ved det, fordi fuldmægtigen selv siger det, er det typisk uden særlig tilværelse.",
        explanation: "Stillingsfuldmagt, forevisningsfuldmagt og tolerancefuldmagt har en ydre synlighed. En mundtlig besked direkte til fuldmægtigen er en §18-fuldmagt uden særlig tilværelse.",
        archiveNote: "Husk: Tredjemand skal kunne konstatere fuldmagten udefra, før den har særlig tilværelse."
      },
      {
        id: 3,
        title: "Rum 3: Den indre og ydre cirkel",
        topic: "Bemyndigelse og legitimation",
        type: "radio",
        story: "Du finder en tavle med to cirkler: Den indre cirkel er bemyndigelse, og den ydre cirkel er legitimation. På tavlen står: “Den indre instruks er skjult. Den ydre grænse kan ses af tredjemand.” Dina ejer en elektronikbutik. Emil er ansat til at sælge butikkens varer. Dina har internt sagt til Emil, at han ikke må give mere end 5 % rabat. Emil sælger en computer til Frederik med 20 % rabat.",
        question: "Hvor ligger Emils handling?",
        options: [
          { id: "a", text: "Inden for både bemyndigelse og legitimation" },
          { id: "b", text: "Uden for bemyndigelsen, men inden for legitimationen" },
          { id: "c", text: "Uden for både bemyndigelse og legitimation" },
          { id: "d", text: "Der er ingen fuldmagt" }
        ],
        correctAnswer: "b",
        hint: "Bemyndigelse = intern instruks. Legitimation = hvad tredjemand med rimelighed kan tro, at fuldmægtigen må.",
        correctFeedback: "Korrekt. Emil har overskredet den interne instruks, men salget ligner stadig en normal disposition for en butikssælger.",
        wrongFeedback: "Overvej om Frederik udefra kan vide, at Emil ikke måtte give 20 % rabat.",
        explanation: "Emil er ansat til at sælge butikkens varer. Salget ligger inden for den ydre legitimation, men rabatten overskrider Dinas interne bemyndigelse.",
        archiveNote: "Husk: Bemyndigelse er internt. Legitimation er eksternt."
      },
      {
        id: 4,
        title: "Rum 4: Den låste hoveddør",
        topic: "Hvornår fuldmagtsgiver bliver bundet",
        type: "multiRadio",
        story: "Du står foran arkivets store hoveddør. Den er låst med tre juridiske bolte. På døren står: “Kun den, der kan afgøre, om hovedmanden bindes, kan åbne døren.”",
        question: "Vælg resultatet i hver case. Alle tre bolte skal åbnes.",
        groups: [
          {
            id: "case1",
            label: "Case 1: Fuldmægtigen handler inden for både bemyndigelse og legitimation.",
            options: [
              { id: "a", text: "Fuldmagtsgiver er bundet" },
              { id: "b", text: "Fuldmagtsgiver er ikke bundet" },
              { id: "c", text: "Kun fuldmægtigen er bundet" }
            ]
          },
          {
            id: "case2",
            label: "Case 2: Fuldmægtigen har fuldmagt med særlig tilværelse, handler uden for bemyndigelsen, men inden for legitimationen. Tredjemand er i god tro.",
            options: [
              { id: "a", text: "Fuldmagtsgiver er bundet" },
              { id: "b", text: "Fuldmagtsgiver er aldrig bundet" },
              { id: "c", text: "Aftalen er automatisk ugyldig" }
            ]
          },
          {
            id: "case3",
            label: "Case 3: Fuldmægtigen handler uden for både bemyndigelse og legitimation.",
            options: [
              { id: "a", text: "Fuldmagtsgiver er bundet, hvis tredjemand er i god tro" },
              { id: "b", text: "Fuldmagtsgiver er ikke bundet" },
              { id: "c", text: "Fuldmagtsgiver er altid bundet" }
            ]
          }
        ],
        correctAnswer: {
          case1: "a",
          case2: "a",
          case3: "b"
        },
        hint: "Tænk i tre zoner: helt indenfor, delvist udenfor, helt udenfor.",
        correctFeedback: "Korrekt. Du har åbnet hoveddørens tre juridiske bolte.",
        wrongFeedback: "En af boltene sidder stadig fast. Husk: Ved fuldmagt med særlig tilværelse kan god tro hos tredjemand få betydning, hvis handlingen ligger inden for legitimationen.",
        explanation: "Hovedmanden bindes, når fuldmægtigen handler inden for fuldmagten. Ved fuldmagt med særlig tilværelse kan hovedmanden også bindes, hvis bemyndigelsen overskrides, men legitimationen overholdes, og tredjemand er i god tro. Uden for både bemyndigelse og legitimation bindes hovedmanden ikke.",
        archiveNote: "Husk: Tredjemands gode tro kan være afgørende ved fuldmagt med særlig tilværelse."
      },
      {
        id: 5,
        title: "Rum 5: Det sidste dokument",
        topic: "§18-fuldmagt og erstatningsansvar",
        type: "multiRadio",
        story: "Det sidste rum er et mørkt kontor. På skrivebordet ligger en mundtlig besked: “Rasmus må købe maleriet for Jonathan for højst 50.000 kr.” Rasmus køber alligevel maleriet for 65.000 kr. Galleriet troede, at Rasmus havde lov. Døren ud af arkivet spørger: “Er Jonathan bundet?”",
        question: "Svar på spørgsmålene om §18-fuldmagt og ansvar.",
        groups: [
          {
            id: "q1",
            label: "Spørgsmål 1: Der er tale om:",
            options: [
              { id: "a", text: "Stillingsfuldmagt" },
              { id: "b", text: "§18-fuldmagt uden særlig tilværelse" },
              { id: "c", text: "Offentlig bekendtgjort fuldmagt" },
              { id: "d", text: "Prokura" }
            ]
          },
          {
            id: "q2",
            label: "Spørgsmål 2: Er Jonathan bundet af købet til 65.000 kr.?",
            options: [
              { id: "a", text: "Ja, fordi galleriet var i god tro" },
              { id: "b", text: "Nej, fordi Rasmus har handlet uden for fuldmagtens grænse" },
              { id: "c", text: "Ja, fordi alle mundtlige fuldmagter binder uanset beløb" },
              { id: "d", text: "Nej, fordi mundtlige fuldmagter aldrig gælder" }
            ]
          },
          {
            id: "bonus",
            label: "Bonusspørgsmål: Kan Rasmus eventuelt blive erstatningsansvarlig over for galleriet?",
            options: [
              { id: "a", text: "Ja, hvis galleriet er i god tro og lider et tab" },
              { id: "b", text: "Nej, aldrig" },
              { id: "c", text: "Kun hvis Jonathan også er bundet" },
              { id: "d", text: "Kun hvis fuldmagten var skriftlig" }
            ]
          }
        ],
        correctAnswer: {
          q1: "b",
          q2: "b",
          bonus: "a"
        },
        hint: "Ved §18-fuldmagt er bemyndigelse og legitimation sammenfaldende. Hvis fuldmægtigen går udenfor, bliver fuldmagtsgiver ikke bundet - heller ikke selv om tredjemand er i god tro.",
        correctFeedback: "Korrekt. Du har forstået §18-fuldmagten. Jonathan er ikke bundet, men Rasmus kan risikere ansvar, hvis galleriet var i god tro og har lidt et tab.",
        wrongFeedback: "Ved §18-fuldmagten kan tredjemand kun kende fuldmagten gennem fuldmægtigen. Derfor beskytter god tro ikke tredjemand på samme måde som ved fuldmagt med særlig tilværelse.",
        explanation: "Den mundtlige besked til Rasmus er en §18-fuldmagt uden særlig tilværelse. Når Rasmus går uden for beløbsgrænsen, går han uden for fuldmagten, og Jonathan bindes ikke. Rasmus kan efter AFTL §25 blive ansvarlig, hvis galleriet var i god tro og lider et tab.",
        archiveNote: "Husk: Fuldmægtigen kan blive erstatningsansvarlig, hvis han ikke havde fornøden fuldmagt."
      }
    ];

    const gameEl = document.getElementById("game");
    const statusRoomEl = document.getElementById("status-room");
    const statusScoreEl = document.getElementById("status-score");
    const statusKeysEl = document.getElementById("status-keys");
    const statusTimeEl = document.getElementById("status-time");
    const statusMistakesEl = document.getElementById("status-mistakes");
    const progressBarEl = document.getElementById("progress-bar");

    // Render-funktioner
    function renderStartScreen() {
      stopTimer();
      currentRoomIndex = 0;
      gameEl.innerHTML = `
        <section class="archive-grid">
          <div class="card">
            <h2 class="room-title">Velkommen til Aftalerettens Arkiv</h2>
            <div class="story-box">
              <p>Du er blevet låst inde mellem gamle lovsamlinger, støvede sagsmapper og mystiske fuldmagter. For at slippe ud skal du åbne fem døre. Hver dør kræver, at du løser en fuldmagtsgåde.</p>
              <p>Svar korrekt, saml nøgler, og bevis at du behersker fuldmagtens regler.</p>
            </div>
            <div class="room-meta" aria-label="Spilinformation">
              <span class="tag locked">5 låste rum</span>
              <span class="tag">⚖️ AFTL §§ 10, 11, 18 og 25</span>
              <span class="tag">📁 10-15 minutter</span>
            </div>
            <div class="button-row">
              <button class="primary-btn" type="button" onclick="startGame()">Start spillet</button>
              <button class="secondary-btn" type="button" onclick="restartGame()">Nulstil status</button>
            </div>
          </div>
          <aside class="start-seal" aria-label="Arkivdør">
            <div>
              <div class="seal-icon">🚪</div>
              <h2>Aftalerettens Arkiv</h2>
              <p class="small-muted">Fem nøgler åbner døren.</p>
            </div>
          </aside>
        </section>
      `;
      updateStatus();
    }

    function renderRoom() {
      roomSolved = false;
      attemptsInCurrentRoom = 0;
      hintUsedInCurrentRoom = false;
      const room = rooms[currentRoomIndex];
      gameEl.innerHTML = `
        <section>
          <h2 class="room-title">${room.title}</h2>
          <div class="room-meta">
            <span class="tag locked">Rum ${room.id} af ${rooms.length}</span>
            <span class="tag">📜 ${room.topic}</span>
          </div>
          <div class="story-box">${paragraphs(room.story)}</div>
          <div class="question-box">
            <h3>Opgave</h3>
            <p>${room.question}</p>
            <form id="answer-form">${renderInteraction(room)}</form>
          </div>
          <div id="hint-box" class="hint-box hidden"></div>
          <div id="feedback-box" class="feedback-box info">Arkivet venter på dit svar.</div>
          <div id="answer-key-current" class="answer-key-box hidden"></div>
          <div class="button-row">
            <button class="primary-btn" id="check-btn" type="button" onclick="checkAnswer()">Tjek svar</button>
            <button class="secondary-btn" id="next-btn" type="button" onclick="goToNextRoom()" disabled>Næste rum</button>
            <button class="secondary-btn" id="hint-btn" type="button" onclick="showHint()">Vis hint</button>
            <button class="secondary-btn danger-btn" type="button" onclick="restartGame()">Genstart spil</button>
          </div>
        </section>
      `;
      updateStatus();
    }

    function renderInteraction(room) {
      if (room.type === "matching") {
        return room.items.map((item) => `
          <label class="match-row">
            <span class="match-name">${item}</span>
            <select name="${item}" aria-label="Vælg rolle for ${item}">
              <option value="">Vælg rolle</option>
              ${room.options.map((option) => `<option value="${option}">${option}</option>`).join("")}
            </select>
          </label>
        `).join("");
      }

      if (room.type === "checkbox") {
        return `<div class="answer-list">${room.options.map((option) => `
          <label class="answer-option">
            <input type="checkbox" name="answer" value="${option.id}">
            <span>${option.text}</span>
          </label>
        `).join("")}</div>`;
      }

      if (room.type === "radio") {
        return `<div class="answer-list">${room.options.map((option) => `
          <label class="answer-option">
            <input type="radio" name="answer" value="${option.id}">
            <span>${option.text}</span>
          </label>
        `).join("")}</div>`;
      }

      if (room.type === "multiRadio") {
        return room.groups.map((group) => `
          <fieldset class="answer-list">
            <legend>${group.label}</legend>
            ${group.options.map((option) => `
              <label class="answer-option">
                <input type="radio" name="${group.id}" value="${option.id}">
                <span>${option.text}</span>
              </label>
            `).join("")}
          </fieldset>
        `).join("");
      }

      return "";
    }

    function renderCurrentAnswerKey() {
      const room = rooms[currentRoomIndex];
      const box = document.getElementById("answer-key-current");
      box.classList.remove("hidden");
      box.innerHTML = `
        <h3>Facit for dette rum</h3>
        <p><strong>Emne:</strong> ${room.topic}</p>
        <p><strong>Korrekt svar:</strong> ${formatCorrectAnswer(room)}</p>
        <p>${room.explanation}</p>
      `;
    }

    function endGame() {
      stopTimer();
      const elapsed = formatElapsed(Date.now() - startTime);
      const rank = getRank();
      const badges = getBadges(Date.now() - startTime);
      gameEl.innerHTML = `
        <section class="card">
          <h2 class="room-title">Du har åbnet Aftalerettens Arkiv</h2>
          <div class="story-box">
            <p>Du har åbnet Aftalerettens Arkiv og løst Fuldmagtsmysteriet.</p>
          </div>
          <div class="question-box">
            <p><strong>Score:</strong> ${score}</p>
            <p><strong>Fejl:</strong> ${mistakes}</p>
            <p><strong>Tid brugt:</strong> ${elapsed}</p>
            <p><strong>Rang:</strong> ${rank}</p>
            <p><strong>Badges:</strong></p>
            <ul class="badges">${badges.map((badge) => `<li>${badge}</li>`).join("")}</ul>
          </div>
          <div class="story-box">
            <h3>Du har trænet:</h3>
            <ul class="recap-list">
              <li>Parterne i et fuldmagtsforhold</li>
              <li>Forskellen på fuldmagt med og uden særlig tilværelse</li>
              <li>Bemyndigelse og legitimation</li>
              <li>Hvornår fuldmagtsgiver bliver bundet</li>
              <li>Hvornår fuldmægtigen kan blive erstatningsansvarlig</li>
            </ul>
          </div>
          <div id="full-answer-key" class="facit-grid hidden"></div>
          <div class="button-row">
            <button class="primary-btn" type="button" onclick="restartGame()">Spil igen</button>
            <button class="secondary-btn" type="button" onclick="toggleFullAnswerKey()">Vis facit og forklaringer</button>
          </div>
        </section>
      `;
      updateStatus();
    }

    // Svarlogik
    function checkAnswer() {
      if (roomSolved) {
        return;
      }

      const room = rooms[currentRoomIndex];
      const answer = getPlayerAnswer(room);
      const feedbackBox = document.getElementById("feedback-box");

      if (!hasAnswered(room, answer)) {
        setFeedback(feedbackBox, "Du skal vælge et svar, før arkivet kan vurdere din løsning.", "info");
        return;
      }

      attemptsInCurrentRoom += 1;

      if (isCorrect(room, answer)) {
        const points = attemptsInCurrentRoom === 1 ? 100 : attemptsInCurrentRoom === 2 ? 70 : 40;
        score += points;
        keys += 1;
        roomSolved = true;
        if (attemptsInCurrentRoom === 1) {
          solvedWithoutMistakeCount += 1;
        }
        setFeedback(feedbackBox, `${room.correctFeedback}<div class="key-found">🗝️ Nøgle fundet! +${points} point</div><p><strong>Arkivnote:</strong> ${room.archiveNote}</p>`, "correct");
        document.getElementById("next-btn").disabled = false;
        document.getElementById("check-btn").disabled = true;
        document.getElementById("hint-btn").disabled = true;
      } else {
        mistakes += 1;
        score = Math.max(0, score - 10);
        setFeedback(feedbackBox, `${room.wrongFeedback}<p class="small-muted">-10 point. Du må prøve igen.</p>`, "wrong");
        if (attemptsInCurrentRoom >= 3) {
          renderCurrentAnswerKey();
        }
      }

      updateStatus();
    }

    function getPlayerAnswer(room) {
      const form = document.getElementById("answer-form");
      const formData = new FormData(form);

      if (room.type === "matching") {
        const answer = {};
        room.items.forEach((item) => {
          answer[item] = formData.get(item) || "";
        });
        return answer;
      }

      if (room.type === "checkbox") {
        return formData.getAll("answer").sort();
      }

      if (room.type === "radio") {
        return formData.get("answer") || "";
      }

      if (room.type === "multiRadio") {
        const answer = {};
        room.groups.forEach((group) => {
          answer[group.id] = formData.get(group.id) || "";
        });
        return answer;
      }

      return "";
    }

    function hasAnswered(room, answer) {
      if (room.type === "matching") {
        return Object.values(answer).every(Boolean);
      }
      if (room.type === "checkbox") {
        return answer.length > 0;
      }
      if (room.type === "radio") {
        return Boolean(answer);
      }
      if (room.type === "multiRadio") {
        return Object.values(answer).every(Boolean);
      }
      return false;
    }

    function isCorrect(room, answer) {
      if (room.type === "matching" || room.type === "multiRadio") {
        return Object.keys(room.correctAnswer).every((key) => answer[key] === room.correctAnswer[key]);
      }
      if (room.type === "checkbox") {
        return arraysEqual(answer, [...room.correctAnswer].sort());
      }
      if (room.type === "radio") {
        return answer === room.correctAnswer;
      }
      return false;
    }

    function arraysEqual(first, second) {
      return first.length === second.length && first.every((value, index) => value === second[index]);
    }

    function setFeedback(element, message, type) {
      element.className = `feedback-box ${type}`;
      element.innerHTML = message;
    }

    function showHint() {
      const room = rooms[currentRoomIndex];
      const hintBox = document.getElementById("hint-box");
      hintBox.classList.remove("hidden");
      hintBox.innerHTML = `<strong>Hint:</strong> ${room.hint}`;

      if (!hintUsedInCurrentRoom) {
        score = Math.max(0, score - 20);
        hintUsedInCurrentRoom = true;
        totalHintsUsed += 1;
        updateStatus();
      }
    }

    function goToNextRoom() {
      if (!roomSolved) {
        return;
      }

      if (keys >= rooms.length) {
        endGame();
        return;
      }

      currentRoomIndex += 1;
      renderRoom();
    }

    // Timer og status
    function startGame() {
      currentRoomIndex = 0;
      score = 0;
      keys = 0;
      mistakes = 0;
      solvedWithoutMistakeCount = 0;
      totalHintsUsed = 0;
      startTime = Date.now();
      startTimer();
      renderRoom();
    }

    function restartGame() {
      score = 0;
      keys = 0;
      mistakes = 0;
      currentRoomIndex = 0;
      attemptsInCurrentRoom = 0;
      hintUsedInCurrentRoom = false;
      roomSolved = false;
      solvedWithoutMistakeCount = 0;
      totalHintsUsed = 0;
      startTime = Date.now();
      renderStartScreen();
    }

    function startTimer() {
      stopTimer();
      timerId = setInterval(updateStatus, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function updateStatus() {
      const roomLabel = keys >= rooms.length ? "Slut" : currentRoomIndex < rooms.length && timerId ? `Rum ${currentRoomIndex + 1} af ${rooms.length}` : "Start";
      statusRoomEl.textContent = roomLabel;
      statusScoreEl.textContent = score;
      statusKeysEl.innerHTML = `${keys} <span class="key">🗝️</span>`;
      statusMistakesEl.textContent = mistakes;
      statusTimeEl.textContent = timerId ? formatElapsed(Date.now() - startTime) : "00:00";
      progressBarEl.style.width = `${(keys / rooms.length) * 100}%`;
    }

    function formatElapsed(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    // Slutskærm
    function getRank() {
      if (score >= 450) {
        return "Partner i Aftaleret";
      }
      if (score >= 300) {
        return "Fuldmagtsdetektiv";
      }
      if (score >= 150) {
        return "Juridisk assistent";
      }
      return "Arkivpraktikant";
    }

    function getBadges(elapsedMs) {
      const badges = [];
      if (solvedWithoutMistakeCount > 0) {
        badges.push(`Skarp jurist (${solvedWithoutMistakeCount} rum uden fejl)`);
      }
      if (totalHintsUsed === 0) {
        badges.push("Paragrafmester");
      }
      if (elapsedMs < 8 * 60 * 1000) {
        badges.push("Hurtigttænkende rådgiver");
      }
      if (badges.length === 0) {
        badges.push("Stædig arkivløser");
      }
      return badges;
    }

    function toggleFullAnswerKey() {
      const box = document.getElementById("full-answer-key");
      box.classList.toggle("hidden");
      box.innerHTML = rooms.map((room) => `
        <article class="answer-key-box">
          <h3>${room.title}</h3>
          <p><strong>Juridisk emne:</strong> ${room.topic}</p>
          <p><strong>Korrekt svar:</strong> ${formatCorrectAnswer(room)}</p>
          <p>${room.explanation}</p>
        </article>
      `).join("");
    }

    function formatCorrectAnswer(room) {
      if (room.type === "matching") {
        return Object.entries(room.correctAnswer).map(([name, role]) => `${name} = ${role}`).join("; ");
      }
      if (room.type === "checkbox") {
        return room.options
          .filter((option) => room.correctAnswer.includes(option.id))
          .map((option) => option.text)
          .join("; ");
      }
      if (room.type === "radio") {
        return room.options.find((option) => option.id === room.correctAnswer).text;
      }
      if (room.type === "multiRadio") {
        return room.groups.map((group) => {
          const correctId = room.correctAnswer[group.id];
          const option = group.options.find((item) => item.id === correctId);
          return `${group.label} ${option.text}`;
        }).join(" | ");
      }
      return "";
    }

    function paragraphs(text) {
      return text
        .split(/\n+/)
        .map((part) => `<p>${part}</p>`)
        .join("");
    }

    renderStartScreen();
  </script>
</body>
</html>
